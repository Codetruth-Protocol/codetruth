[package]
name = "codetruth-python"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Python bindings for CodeTruth Protocol"

[lib]
name = "_core"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.20", features = ["extension-module"] }

[profile.release]
opt-level = 3
lto = true

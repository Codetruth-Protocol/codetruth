name: 'CodeTruth Analysis'
description: 'Run CodeTruth Protocol analysis on your codebase'
author: 'CodeTruth Contributors'

branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  analyze:
    description: 'Run analysis on changed files'
    required: false
    default: 'true'
  check-policies:
    description: 'Check policy compliance'
    required: false
    default: 'true'
  policies-path:
    description: 'Path to policy files'
    required: false
    default: '.ctp/policies/'
  detect-drift:
    description: 'Detect drift from base branch'
    required: false
    default: 'true'
  fail-on-violation:
    description: 'Fail the action on policy violations'
    required: false
    default: 'false'
  min-drift-level:
    description: 'Minimum drift level to report (none, low, medium, high, critical)'
    required: false
    default: 'medium'
  api-key:
    description: 'API key for LLM enhancement (optional)'
    required: false
  post-comment:
    description: 'Post analysis results as PR comment'
    required: false
    default: 'true'

outputs:
  drift-detected:
    description: 'Whether drift was detected'
  violations-count:
    description: 'Number of policy violations'
  analysis-report:
    description: 'Path to the analysis report JSON'

runs:
  using: 'composite'
  steps:
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    - name: Build ctp-mcp
      shell: bash
      run: |
        echo "Building ctp-mcp server..."
        cd ${{ github.action_path }}/../../
        cargo build --release --bin ctp-mcp
        echo "ctp-mcp built successfully"

    - name: Get changed files
      id: changed-files
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} > changed_files.txt
        else
          git diff --name-only HEAD~1 HEAD > changed_files.txt
        fi
        echo "Changed files:"
        cat changed_files.txt

    - name: Run ctp-mcp Analysis
      shell: bash
      run: |
        mkdir -p .ctp/output
        
        # Build JSON-RPC request for analyze_codebase
        REQUEST='{
          "jsonrpc": "2.0",
          "id": 1,
          "method": "tools/call",
          "params": {
            "name": "analyze_codebase",
            "arguments": {
              "root_path": ".",
              "project_name": "${{ github.repository }}",
              "project_purpose": "CI/CD Compliance Check"
            }
          }
        }'
        
        # Run ctp-mcp and capture output
        echo "$REQUEST" | ${{ github.action_path }}/../../target/release/ctp-mcp > .ctp/output/analysis.json
        
        echo "Analysis complete. Results:"
        cat .ctp/output/analysis.json

    - name: Parse Analysis Results
      id: parse-results
      shell: bash
      run: |
        if [ -f .ctp/output/analysis.json ]; then
          # Extract violation count using jq or basic parsing
          if command -v jq &> /dev/null; then
            VIOLATIONS=$(jq '.total_violations // 0' .ctp/output/analysis.json)
            DRIFT=$(jq '.drift_count // 0' .ctp/output/analysis.json)
          else
            # Fallback: basic grep
            VIOLATIONS=$(grep -o '"total_violations":[0-9]*' .ctp/output/analysis.json | cut -d: -f2 || echo "0")
            DRIFT=$(grep -o '"drift_count":[0-9]*' .ctp/output/analysis.json | cut -d: -f2 || echo "0")
          fi
          
          echo "violations-count=$VIOLATIONS" >> $GITHUB_OUTPUT
          echo "drift-detected=$([ "$DRIFT" -gt 0 ] && echo "true" || echo "false")" >> $GITHUB_OUTPUT
          echo "analysis-report=.ctp/output/analysis.json" >> $GITHUB_OUTPUT
          
          if [ "${{ inputs.fail-on-violation }}" = "true" ] && [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error::Found $VIOLATIONS policy violations"
            exit 1
          fi
        fi

    - name: Post PR Comment
      if: inputs.post-comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      run: |
        if [ -f .ctp/output/analysis.json ]; then
          echo "Posting analysis results to PR..."
          
          # Create comment body
          COMMENT_BODY="## 🔍 CodeTruth Analysis Results
          
          **Repository:** ${{ github.repository }}
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.head_ref }}
          
          \`\`\`json
          $(cat .ctp/output/analysis.json)
          \`\`\`
          
          [View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          "
          
          # Post comment using GitHub CLI
          if command -v gh &> /dev/null; then
            gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT_BODY"
          else
            echo "GitHub CLI not found, skipping comment posting"
          fi
        fi
